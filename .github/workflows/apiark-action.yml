# Reusable GitHub Action workflow for running ApiArk CLI tests
# Users can reference this in their own repos:
#
#   jobs:
#     api-tests:
#       uses: berbicanes/apiark/.github/workflows/apiark-action.yml@main
#       with:
#         collection: ./my-api-collection
#         environment: staging
#         reporter: junit

name: ApiArk API Tests

on:
  workflow_call:
    inputs:
      collection:
        description: "Path to the ApiArk collection directory"
        required: true
        type: string
      environment:
        description: "Environment name to use"
        required: false
        type: string
        default: ""
      reporter:
        description: "Test reporter format (json, junit, html)"
        required: false
        type: string
        default: "json"
      data-file:
        description: "Path to data file for data-driven testing"
        required: false
        type: string
        default: ""
      iterations:
        description: "Number of iterations to run"
        required: false
        type: number
        default: 1
      fail-on-error:
        description: "Fail the workflow if any test fails"
        required: false
        type: boolean
        default: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-apiark-cli-${{ hashFiles('apps/cli/Cargo.lock') }}

      - name: Build ApiArk CLI
        run: cargo build --release --manifest-path apps/cli/Cargo.toml

      - name: Run API tests
        id: tests
        run: |
          ARGS="run ${{ inputs.collection }}"
          if [ -n "${{ inputs.environment }}" ]; then
            ARGS="$ARGS --env ${{ inputs.environment }}"
          fi
          ARGS="$ARGS --reporter ${{ inputs.reporter }}"
          if [ -n "${{ inputs.data-file }}" ]; then
            ARGS="$ARGS --data ${{ inputs.data-file }}"
          fi
          if [ "${{ inputs.iterations }}" != "1" ]; then
            ARGS="$ARGS --iterations ${{ inputs.iterations }}"
          fi

          ./target/release/apiark $ARGS | tee results.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apiark-test-results
          path: results.txt

      - name: Check results
        if: inputs.fail-on-error && steps.tests.outputs.exit_code != '0'
        run: exit 1
